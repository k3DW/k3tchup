name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2022
    steps:
      - name: Install bootstrapper
        run: |
          curl -L -o vs_buildtools.exe https://aka.ms/vs/17/release/vs_buildtools.exe

      - name: Run bootstrapper
        run: |
          .\vs_buildtools.exe `
            --installPath D:\vs-install `
            --add Microsoft.VisualStudio.Workload.VCTools `
            --includeRecommended `
            --noUpdateInstaller `
            --passive `
            --norestart

      - name: Check exit code
        if: always()
        run: |
          Write-Host "Last exit code: $LASTEXITCODE"
          if (Test-Path "D:\vs-install") {
            Write-Host "Installation directory exists"
            Get-ChildItem "D:\vs-install" | Select-Object Name
          } else {
            Write-Host "Installation directory does NOT exist"
          }

      - name: Check temp directory
        if: always()
        run: |
          Write-Host "Checking for installer temp directories..."
          Get-ChildItem "C:\Users\RUNNER~1\AppData\Local\Temp" -Filter "*vs*" -Directory | Select-Object Name

      - name: Check installer logs
        if: always()
        run: |
          Write-Host "Looking for VS installer logs..."
          $logPath = "C:\Users\RUNNER~1\AppData\Local\Temp"
          Get-ChildItem $logPath -Filter "dd_*" | Select-Object Name, LastWriteTime | Head -20


      - name: Read bootstrapper log
        if: always()
        run: |
          $latestLog = Get-ChildItem "C:\Users\runneradmin\AppData\Local\Temp\dd_bootstrapper*.log" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if ($latestLog) {
            Write-Host "=== Latest Bootstrapper Log ==="
            Get-Content $latestLog.FullName
          } else {
            Write-Host "No bootstrapper logs found"
          }