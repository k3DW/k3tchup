name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2022
    steps:
      - name: Install bootstrapper
        run: |
          curl -L -o vs_buildtools.exe https://aka.ms/vs/17/release/vs_buildtools.exe

      - name: Run bootstrapper
        run: |
          .\vs_buildtools.exe `
            --installPath $PWD\myinstall `
            --add Microsoft.VisualStudio.Workload.VCTools `
            --includeRecommended `
            --noUpdateInstaller `
            --quiet `
            --norestart `
            --wait `
            --nocache

