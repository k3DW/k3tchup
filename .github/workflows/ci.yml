name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check disk space
        run: |
          Get-Volume | Where-Object {$_.DriveLetter -eq 'D'} | Select-Object DriveLetter, SizeRemaining, Size

      - name: Download Visual Studio Build Tools
        run: |
          curl -L -o vs_buildtools.exe https://aka.ms/vs/17/release/vs_buildtools.exe

      - name: Run bootstrapper
        timeout-minutes: 30
        run: |
          $process = Start-Process -FilePath ".\vs_buildtools.exe" `
            -ArgumentList @(
              '--installPath', 'D:\vs-install',
              '--add', 'Microsoft.VisualStudio.Workload.VCTools',
              '--includeRecommended',
              '--noUpdateInstaller',
              '--quiet',
              '--norestart'
            ) `
            -NoNewWindow `
            -PassThru `
            -Wait

          Write-Host "Process exited with code: $($process.ExitCode)"
          exit $process.ExitCode

      - name: Verify installation
        run: |
          if (Test-Path "D:\vs-install") {
            Write-Host "Installation directory exists"
            Get-ChildItem "D:\vs-install" | Select-Object Name
            if (Test-Path "D:\vs-install\VC\Tools\MSVC") {
              Write-Host "VCTools installed successfully"
            } else {
              Write-Host "VCTools NOT found"
              exit 1
            }
          } else {
            Write-Host "Installation directory does NOT exist"
            exit 1
          }

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build project
        run: |
          msbuild -version
          # Add your actual build command here
          # msbuild YourProject.sln /p:Configuration=Release