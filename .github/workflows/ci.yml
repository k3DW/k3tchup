name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2022
    steps:
      - name: Install bootstrapper
        run: |
          curl -L -o vs_buildtools.exe https://download.visualstudio.microsoft.com/download/pr/9b2a4ec4-2233-4550-bb74-4e7facba2e03/00f873e49619fc73dedb5f577e52c1419d058b9bf2d0d3f6a09d4c05058c3f79/vs_BuildTools.exe

      - name: Run bootstrapper
        run: |
          .\vs_buildtools.exe `
            --installPath $PWD\install-msvc `
            --add Microsoft.VisualStudio.Workload.VCTools `
            --includeRecommended `
            --quiet `
            --norestart

          $timeout = 3600
          $elapsed = 0
          $interval = 10
          while ($elapsed -lt $timeout) {
            $processes = Get-Process | Where-Object {$_.Name -like "setup"} -ErrorAction SilentlyContinue
            if ($null -eq $processes) {
              Write-Host "Installation complete"
              exit 0
            }
            Start-Sleep -Seconds $interval
            $elapsed += $interval
            Write-Host "Waiting for setup to finish... ($elapsed seconds elapsed)"
          }
          Write-Error "Installation timed out after $timeout seconds"
          exit 1

      - name: Verify installation
        run: |
          if (Test-Path "$PWD\install-msvc\VC\Tools\MSVC") {
            Write-Host "Installation directory exists"
            Get-ChildItem "$PWD\install-msvc\VC\Tools\MSVC"
          } else {
            Write-Host "Installation directory not found"
          }

      - name: Verify cl.exe exists
        run: |
          $clPath = Get-ChildItem -Path "$PWD\install-msvc" -Recurse -Filter "cl.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($clPath) {
            Write-Host "Found cl.exe at: $($clPath.FullName)"
            & $clPath.FullName
          } else {
            Write-Host "cl.exe not found"
          }

      - name: Check installer logs
        run: |
          Get-ChildItem $env:TEMP\dd_*.log | Select-Object | ForEach-Object {
            Write-Host "=== $($_.Name) ==="
            Get-Content $_.FullName
          }

      - name: Check what was installed
        run: |
          Write-Host "Checking D:\vs-install..."
          if (Test-Path "D:\vs-install") {
            Get-ChildItem "D:\vs-install" -Recurse | Select-Object -First 20
          } else {
            Write-Host "D:\vs-install does not exist"
          }
          Write-Host ""
          Write-Host "Checking original path..."
          if (Test-Path "D:\a\k3tchup\k3tchup\install-msvc") {
            Get-ChildItem "D:\a\k3tchup\k3tchup\install-msvc" -Recurse | Select-Object -First 20
          } else {
            Write-Host "D:\a\k3tchup\k3tchup\install-msvc does not exist"
          }

      - name: Run bootstrapper
        run: |
          .\vs_buildtools.exe `
            --installPath D:\vs-install `
            --add Microsoft.VisualStudio.Workload.VCTools `
            --includeRecommended `
            --quiet `
            --norestart
          Write-Host "Bootstrapper exited with code: $LASTEXITCODE"

      - name: Debug - check for setup processes
        run: |
          Get-Process | Where-Object {$_.Name -like "*setup*" -or $_.Name -like "*vs*"} | Select-Object Name, Id, StartTime

      - name: Check full logs
        run: |
          $logFiles = Get-ChildItem $env:TEMP\dd_*.log | Sort-Object LastWriteTime -Descending | Select-Object
          foreach ($log in $logFiles) {
            Write-Host "=== $($log.Name) ==="
            Get-Content $log.FullName
          }