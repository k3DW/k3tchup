name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2025
    steps:
      - name: Check CMake
        run: |
          cmake --version

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: k3DW/setup-msvc@dev
        with:
          vs-version: "18.0"

      - name: Check cl
        run: |
          cl.exe

      - name: Build the test
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 18 2026"
          cmake --build . --target main
          & D:\a\k3tchup\k3tchup\build\Debug\main.exe
