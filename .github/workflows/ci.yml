name: msvc

on:
  push:

jobs:
  install-msvc:
    runs-on: windows-2022
    steps:
      - name: Install bootstrapper
        run: |
          curl -L -o vs_buildtools.exe https://aka.ms/vs/17/release/vs_buildtools.exe

      - name: Run bootstrapper
        run: |
          .\vs_buildtools.exe `
            --installPath D:\vs-install `
            --add Microsoft.VisualStudio.Workload.VCTools `
            --includeRecommended `
            --noUpdateInstaller `
            --passive `
            --norestart

      - name: Read all installer logs
        if: always()
        run: |
          Write-Host "=== Checking temp directory ==="
          $tempPath = "C:\Users\runneradmin\AppData\Local\Temp"
          Get-ChildItem $tempPath -Filter "dd_*" | ForEach-Object {
            Write-Host "`n=== File: $($_.Name) (Size: $($_.Length) bytes) ==="
            if ($_.Length -gt 0) {
              Get-Content $_.FullName
            } else {
              Write-Host "(empty file)"
            }
          }

          Write-Host "`n=== Checking VSLogs directory ==="
          $vsLogsPath = "$tempPath\VSLogs"
          if (Test-Path $vsLogsPath) {
            Get-ChildItem $vsLogsPath -Recurse -File | ForEach-Object {
              Write-Host "`nFile: $($_.FullName)"
              Get-Content $_.FullName | Select-Object -First 50
            }
          }