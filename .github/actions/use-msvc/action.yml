name: use-msvc

inputs:
  vs-version:
    required: true
  bootstrapper-url:
    required: true
  install-path:
    default: D:\vs-install

runs:
  using: "composite"
  steps:
    - name: Download and install VS Build Tools, and setup MSVC environment
      shell: powershell
      run: |
        mkdir ${{ inputs.install-path }}
        $installPath = Resolve-Path ${{ inputs.install-path }}

        curl.exe -L -o vs_buildtools.exe ${{ inputs.bootstrapper-url }}

        $process = Start-Process -FilePath ".\vs_buildtools.exe" `
          -ArgumentList @(
            '--installPath', $installPath,
            '--add', 'Microsoft.VisualStudio.Component.VC.${{ inputs.vs-version }}.x86.x64',
            '--add', 'Microsoft.VisualStudio.Component.VC.Tools.x86.x64',
            '--includeRecommended',
            '--noUpdateInstaller',
            '--quiet',
            '--norestart'
          ) `
          -NoNewWindow `
          -PassThru `
          -Wait

        cmd /c "call $installPath\VC\Auxiliary\Build\vcvars64.bat >nul && set" |
          ForEach-Object {
            if ($_ -match '^(.*?)=(.*)$') {
              "$($matches[1])=$($matches[2])" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }
